# Note:
# - videoenc and audio entries will be connected directly to the muxer
# - audio and muxer are optional, but if audio is set, muxer must also be set
# - audio is an ordered list of {id, enc} entries; the user-selected codec is
#   used if its id is present, otherwise the first listed entry is used
# - ${N_THREADS} will be replaced with ideal thread count
# - default suggested-max-fps is 60

supported:
  - id: webm-vp8
    name: WebM
    extension: webm
    videoenc: >
      videoconvert chroma-mode=none dither=none matrix-mode=output-only n-threads=${N_THREADS} !
      vp8enc max-quantizer=17 cpu-used=16 deadline=1 static-threshold=100 keyframe-mode=disabled buffer-size=20000 threads=${N_THREADS} !
      queue
    audio:
      - id: opus
        enc: >
          audioconvert !
          opusenc !
          queue
    muxer: webmmux

  - id: mp4
    name: MP4
    extension: mp4
    videoenc: >
      videoconvert chroma-mode=none dither=none matrix-mode=output-only n-threads=${N_THREADS} !
      x264enc qp-max=17 speed-preset=ultrafast threads=${N_THREADS} !
      capsfilter caps=video/x-h264,profile=baseline !
      queue !
      h264parse
    audio:
      - id: aac
        enc: >
          audioconvert !
          avenc_aac bitrate=128000 !
          aacparse !
          queue
      - id: opus
        enc: >
          audioconvert !
          opusenc bitrate=128000 !
          opusparse !
          queue
    muxer: mp4mux fragment-duration=500 fragment-mode=first-moov-then-finalise

  - id: matroska-h264
    name: Matroska
    extension: mkv
    videoenc: >
      videoconvert chroma-mode=none dither=none matrix-mode=output-only n-threads=${N_THREADS} !
      x264enc qp-max=17 speed-preset=ultrafast threads=${N_THREADS} !
      capsfilter caps=video/x-h264,profile=baseline !
      queue !
      h264parse
    audio:
      - id: opus
        enc: >
          audioconvert !
          opusenc !
          queue
      - id: aac
        enc: >
          audioconvert !
          avenc_aac bitrate=128000 !
          aacparse !
          queue
    muxer: matroskamux

  - id: gif
    name: GIF
    extension: gif
    suggested-max-fps: 24
    videoenc: >
      videoconvert chroma-mode=none dither=none matrix-mode=output-only n-threads=${N_THREADS} !
      gifenc repeat=-1 speed=30 !
      queue

  - id: va-h264
    name: MP4 (VA-API H.264)
    extension: mp4
    videoenc: >
      vapostproc !
      vah264enc rate-control=cqp qpi=22 qpp=22 qpb=22 b-frames=0 key-int-max=60 !
      queue !
      h264parse
    audio:
      - id: aac
        enc: >
          audioconvert !
          avenc_aac bitrate=128000 !
          aacparse !
          queue
      - id: opus
        enc: >
          audioconvert !
          opusenc bitrate=128000 !
          opusparse !
          queue
    muxer: mp4mux fragment-duration=500 fragment-mode=first-moov-then-finalise

  - id: va-h265
    name: MP4 (VA-API H.265)
    extension: mp4
    videoenc: >
      vapostproc !
      vah265enc rate-control=cqp qpi=22 qpp=22 qpb=22 b-frames=0 key-int-max=60 !
      queue !
      h265parse
    audio:
      - id: aac
        enc: >
          audioconvert !
          avenc_aac bitrate=128000 !
          aacparse !
          queue
      - id: opus
        enc: >
          audioconvert !
          opusenc bitrate=128000 !
          opusparse !
          queue
    muxer: mp4mux fragment-duration=500 fragment-mode=first-moov-then-finalise

  - id: va-av1
    name: Matroska (VA-API AV1)
    extension: mkv
    videoenc: >
      vapostproc !
      vaav1enc rate-control=cqp qp=110 key-int-max=60 !
      queue !
      av1parse
    audio:
      - id: opus
        enc: >
          audioconvert !
          opusenc !
          queue
      - id: aac
        enc: >
          audioconvert !
          avenc_aac bitrate=128000 !
          aacparse !
          queue
    muxer: matroskamux

  - id: nvenc-h264
    name: MP4 (NVENC H.264)
    extension: mp4
    videoenc: >
      cudaupload !
      nvh264enc preset=p4 tune=low-latency rc-mode=constqp qp-const-i=22 qp-const-p=22 qp-const-b=22 gop-size=60 bframes=0 zerolatency=true !
      queue !
      h264parse
    audio:
      - id: aac
        enc: >
          audioconvert !
          avenc_aac bitrate=128000 !
          aacparse !
          queue
      - id: opus
        enc: >
          audioconvert !
          opusenc bitrate=128000 !
          opusparse !
          queue
    muxer: mp4mux fragment-duration=500 fragment-mode=first-moov-then-finalise

  - id: nvenc-h265
    name: MP4 (NVENC H.265)
    extension: mp4
    videoenc: >
      cudaupload !
      nvh265enc preset=p4 tune=low-latency rc-mode=constqp qp-const-i=22 qp-const-p=22 qp-const-b=22 gop-size=60 bframes=0 zerolatency=true !
      queue !
      h265parse
    audio:
      - id: aac
        enc: >
          audioconvert !
          avenc_aac bitrate=128000 !
          aacparse !
          queue
      - id: opus
        enc: >
          audioconvert !
          opusenc bitrate=128000 !
          opusparse !
          queue
    muxer: mp4mux fragment-duration=500 fragment-mode=first-moov-then-finalise

  - id: nvenc-av1
    name: Matroska (NVENC AV1)
    extension: mkv
    videoenc: >
      cudaupload !
      nvav1enc preset=p4 tune=low-latency rc-mode=constqp qp-const-i=22 qp-const-p=22 qp-const-b=22 gop-size=60 bframes=0 zerolatency=true !
      queue !
      av1parse
    audio:
      - id: opus
        enc: >
          audioconvert !
          opusenc !
          queue
      - id: aac
        enc: >
          audioconvert !
          avenc_aac bitrate=128000 !
          aacparse !
          queue
    muxer: matroskamux

experimental:
  - id: webm-vp9
    name: WebM (VP9)
    extension: webm
    videoenc: >
      videoconvert chroma-mode=none dither=none matrix-mode=output-only n-threads=${N_THREADS} !
      vp9enc max-quantizer=17 cpu-used=16 deadline=1 static-threshold=100 keyframe-mode=disabled buffer-size=20000 threads=${N_THREADS} !
      queue
    audio:
      - id: opus
        enc: >
          audioconvert !
          opusenc !
          queue
    muxer: webmmux

  - id: webm-av1
    name: WebM (AV1)
    extension: webm
    videoenc: >
      videoconvert chroma-mode=none dither=none matrix-mode=output-only n-threads=${N_THREADS} !
      av1enc usage-profile=realtime max-quantizer=17 cpu-used=5 end-usage=cq buf-sz=20000 threads=${N_THREADS} !
      queue
    audio:
      - id: opus
        enc: >
          audioconvert !
          opusenc !
          queue
    muxer: webmmux
